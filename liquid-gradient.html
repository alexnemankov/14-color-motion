<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Gradient</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --panel-bg: rgba(10, 10, 14, 0.88);
    --panel-border: rgba(255,255,255,0.08);
    --input-bg: rgba(255,255,255,0.07);
    --input-border: rgba(255,255,255,0.12);
    --text: #e8e8ee;
    --text-dim: rgba(232,232,238,0.45);
    --accent: #4af;
    --font: 'JetBrains Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: var(--font);
  }

  canvas {
    display: block;
    width: 100vw; height: 100vh;
    cursor: crosshair;
  }

  /* PANEL */
  #panel {
    position: fixed;
    top: 50%;
    right: 24px;
    transform: translateY(-50%);
    width: 260px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    z-index: 100;
    transition: opacity 0.4s ease, transform 0.4s ease;
    user-select: none;
  }

  #panel.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-50%) translateX(20px);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--panel-border);
  }

  .panel-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  .btn-add {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--panel-border);
    background: var(--input-bg);
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
  }
  .btn-add:hover { background: rgba(255,255,255,0.14); color: var(--text); }

  /* COLOR LIST */
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    animation: fadeIn 0.2s ease;
  }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .color-swatch input[type="color"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .color-hex {
    flex: 1;
    font-family: var(--font);
    font-size: 11px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    padding: 5px 8px;
    outline: none;
    letter-spacing: 0.06em;
    transition: border-color 0.2s;
  }

  .color-hex:focus { border-color: var(--accent); }

  .btn-remove {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .btn-remove:hover { color: #f55; background: rgba(255,80,80,0.1); }

  .add-color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--panel-border);
  }

  .add-color-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px dashed var(--panel-border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 16px;
    transition: border-color 0.2s, color 0.2s;
  }
  .add-color-btn:hover { border-color: var(--accent); color: var(--accent); }

  .add-color-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* PARAMS */
  .param-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 9px;
  }

  .param-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    width: 72px;
    flex-shrink: 0;
  }

  .param-input {
    width: 48px;
    font-family: var(--font);
    font-size: 11px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    padding: 4px 6px;
    outline: none;
    text-align: center;
    flex-shrink: 0;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .param-input::-webkit-inner-spin-button,
  .param-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .param-input:focus { border-color: var(--accent); }

  .param-slider {
    flex: 1;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--input-border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
  }

  .param-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px rgba(68,170,255,0.5);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .param-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .param-slider::-moz-range-thumb {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  .stepper {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .stepper button {
    width: 18px; height: 11px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    padding: 0;
    transition: background 0.15s, color 0.15s;
  }
  .stepper button:hover { background: rgba(255,255,255,0.14); color: var(--text); }

  /* BOTTOM CONTROLS */
  .bottom-controls {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--panel-border);
  }

  .ctrl-btn {
    flex: 1;
    height: 32px;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .ctrl-btn.active { background: rgba(68,170,255,0.15); color: var(--accent); border-color: rgba(68,170,255,0.4); }

  /* TOGGLE BUTTON (always visible) */
  #toggle-ui {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(10,10,14,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(16px);
    cursor: pointer;
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.3s, background 0.2s;
    color: rgba(255,255,255,0.5);
    font-size: 15px;
  }
  #toggle-ui:hover { background: rgba(30,30,40,0.9); color: #fff; }
  #toggle-ui.ui-visible { opacity: 0; pointer-events: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Hint */
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #hint.fade { opacity: 0; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="panel">
  <div class="panel-header">
    <span class="panel-title">Liquid Gradient</span>
  </div>

  <div id="color-list"></div>

  <div class="add-color-row">
    <button class="add-color-btn" id="btn-add-color">+</button>
    <span class="add-color-label">Add color…</span>
  </div>

  <div class="param-row">
    <span class="param-label">Seed</span>
    <input class="param-input" id="p-seed" type="number" value="564">
    <input class="param-slider" id="s-seed" type="range" min="0" max="9999" step="1" value="564">
  </div>
  <div class="param-row">
    <span class="param-label">Speed</span>
    <input class="param-input" id="p-speed" type="number" value="2" step="0.1">
    <div class="stepper">
      <button onclick="stepParam('speed',0.1)">▲</button>
      <button onclick="stepParam('speed',-0.1)">▼</button>
    </div>
    <input class="param-slider" id="s-speed" type="range" min="0" max="10" step="0.1" value="2">
  </div>
  <div class="param-row">
    <span class="param-label">Scale</span>
    <input class="param-input" id="p-scale" type="number" value="0.22" step="0.01">
    <input class="param-slider" id="s-scale" type="range" min="0.01" max="2" step="0.01" value="0.22">
  </div>
  <div class="param-row">
    <span class="param-label">Amplitude</span>
    <input class="param-input" id="p-amplitude" type="number" value="0.56" step="0.01">
    <input class="param-slider" id="s-amplitude" type="range" min="0" max="2" step="0.01" value="0.56">
  </div>
  <div class="param-row">
    <span class="param-label">Frequency</span>
    <input class="param-input" id="p-frequency" type="number" value="0.59" step="0.01">
    <input class="param-slider" id="s-frequency" type="range" min="0.01" max="4" step="0.01" value="0.59">
  </div>
  <div class="param-row">
    <span class="param-label">Definition</span>
    <input class="param-input" id="p-definition" type="number" value="6" step="1">
    <div class="stepper">
      <button onclick="stepParam('definition',1)">▲</button>
      <button onclick="stepParam('definition',-1)">▼</button>
    </div>
    <input class="param-slider" id="s-definition" type="range" min="1" max="12" step="1" value="6">
  </div>
  <div class="param-row">
    <span class="param-label">Bands</span>
    <input class="param-input" id="p-bands" type="number" value="4" step="1">
    <input class="param-slider" id="s-bands" type="range" min="1" max="16" step="1" value="4">
  </div>

  <div class="bottom-controls">
    <button class="ctrl-btn" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
    <button class="ctrl-btn" id="btn-fs" onclick="toggleFullscreen()">⛶ Full</button>
    <button class="ctrl-btn" id="btn-hide" onclick="hideUI()">✕ Hide</button>
  </div>
</div>

<button id="toggle-ui" onclick="showUI()" title="Show controls">⊞</button>

<div id="hint">Press H to hide UI · F for fullscreen</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const params = {
  seed: 564, speed: 2, scale: 0.22,
  amplitude: 0.56, frequency: 0.59,
  definition: 6, bands: 4
};

let colors = [
  [10, 0, 20],
  [107, 0, 194],
  [255, 45, 107],
  [255, 149, 0],
];

let paused = false;
let animTime = 0;
let lastTimestamp = null;

// ─── CANVAS / GL SETUP ───────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

const vsSource = `
attribute vec2 aPos;
void main(){ gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const fsSource = `
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform float uScale;
uniform float uAmplitude;
uniform float uFrequency;
uniform float uDefinition;
uniform float uBands;
uniform float uSeed;
uniform vec3  uColors[8];
uniform int   uColorCount;

// Smooth noise helpers
vec3 hash3(vec3 p){
  p = vec3(dot(p,vec3(127.1,311.7,74.7)),
           dot(p,vec3(269.5,183.3,246.1)),
           dot(p,vec3(113.5,271.9,124.6)));
  return -1.0 + 2.0*fract(sin(p)*43758.5453123);
}

float noise(vec3 p){
  vec3 i = floor(p);
  vec3 f = fract(p);
  vec3 u = f*f*(3.0-2.0*f);
  return mix(mix(mix(dot(hash3(i+vec3(0,0,0)),f-vec3(0,0,0)),
                     dot(hash3(i+vec3(1,0,0)),f-vec3(1,0,0)),u.x),
                 mix(dot(hash3(i+vec3(0,1,0)),f-vec3(0,1,0)),
                     dot(hash3(i+vec3(1,1,0)),f-vec3(1,1,0)),u.x),u.y),
             mix(mix(dot(hash3(i+vec3(0,0,1)),f-vec3(0,0,1)),
                     dot(hash3(i+vec3(1,0,1)),f-vec3(1,0,1)),u.x),
                 mix(dot(hash3(i+vec3(0,1,1)),f-vec3(0,1,1)),
                     dot(hash3(i+vec3(1,1,1)),f-vec3(1,1,1)),u.x),u.y),u.z);
}

float fbm(vec3 p, int octaves){
  float val = 0.0, amp = 0.5, freq = 1.0;
  for(int i=0;i<12;i++){
    if(i>=octaves) break;
    val += amp * noise(p * freq);
    freq *= 2.0;
    amp  *= 0.5;
  }
  return val;
}

vec3 lerpColor(vec3 a, vec3 b, float t){ return mix(a, b, clamp(t,0.0,1.0)); }

vec3 paletteColor(float t){
  t = fract(t);
  float segment = t * float(uColorCount - 1);
  int idx = int(floor(segment));
  float f = fract(segment);
  // clamp index
  vec3 c0 = uColors[0], c1 = uColors[0];
  for(int i=0;i<8;i++){
    if(i==idx)   c0 = uColors[i];
    if(i==idx+1) c1 = uColors[i];
  }
  // smooth step
  f = f*f*(3.0-2.0*f);
  return lerpColor(c0, c1, f);
}

void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  uv.y = 1.0 - uv.y;

  // domain warp
  vec3 seed3 = vec3(uSeed * 0.001, uSeed * 0.0013, uSeed * 0.0017);
  float t = uTime;
  vec3 p = vec3(uv * uScale, t * 0.1) + seed3;

  float warp = uAmplitude;
  // two layers of domain warp
  vec3 q = vec3(
    fbm(p + vec3(0.0, 0.0, t*0.05), int(uDefinition)),
    fbm(p + vec3(5.2, 1.3, t*0.05), int(uDefinition)),
    fbm(p + vec3(1.7, 9.2, t*0.05), int(uDefinition))
  );
  vec3 r = vec3(
    fbm(p + warp*q + vec3(1.7, 9.2, t*0.08), int(uDefinition)),
    fbm(p + warp*q + vec3(8.3, 2.8, t*0.08), int(uDefinition)),
    fbm(p + warp*q + vec3(2.8, 4.1, t*0.08), int(uDefinition))
  );

  float f = fbm(p * uFrequency + warp*r + vec3(t*0.03), int(uDefinition));

  // Band quantization
  float banded = floor(f * uBands + 0.5) / uBands;
  float blended = mix(f, banded, 0.5);

  // smooth value → color index
  float colorT = blended * 0.5 + 0.5;
  vec3 col = paletteColor(colorT);

  // subtle vignette
  vec2 vig = uv - 0.5;
  float v = 1.0 - dot(vig, vig) * 0.6;
  col *= v;

  gl_FragColor = vec4(col, 1.0);
}
`;

function createShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vsSource));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const U = {};
['uRes','uTime','uScale','uAmplitude','uFrequency','uDefinition','uBands','uSeed','uColors','uColorCount']
  .forEach(n => U[n] = gl.getUniformLocation(prog, n));

function resize(){
  canvas.width  = window.innerWidth  * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
function render(ts){
  requestAnimationFrame(render);
  if(!paused){
    const dt = lastTimestamp === null ? 0 : (ts - lastTimestamp) / 1000;
    lastTimestamp = ts;
    animTime += dt * params.speed;
  } else {
    lastTimestamp = ts;
  }

  gl.uniform2f(U.uRes, canvas.width, canvas.height);
  gl.uniform1f(U.uTime,       animTime);
  gl.uniform1f(U.uScale,      params.scale);
  gl.uniform1f(U.uAmplitude,  params.amplitude);
  gl.uniform1f(U.uFrequency,  params.frequency);
  gl.uniform1f(U.uDefinition, params.definition);
  gl.uniform1f(U.uBands,      params.bands);
  gl.uniform1f(U.uSeed,       params.seed);

  const flat = [];
  colors.forEach(c => { flat.push(c[0]/255, c[1]/255, c[2]/255); });
  while(flat.length < 24) flat.push(0,0,0);
  gl.uniform3fv(U.uColors, new Float32Array(flat));
  gl.uniform1i(U.uColorCount, colors.length);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(render);

// ─── COLOR UI ────────────────────────────────────────────────────────────────
function hexToRgb(hex){
  hex = hex.replace('#','');
  const n = parseInt(hex, 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function rgbToHex(r,g,b){
  return ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1).toUpperCase();
}

function buildColorUI(){
  const list = document.getElementById('color-list');
  list.innerHTML = '';
  colors.forEach((rgb, i) => {
    const hex = rgbToHex(...rgb);
    const row = document.createElement('div');
    row.className = 'color-row';
    row.innerHTML = `
      <div class="color-swatch" style="background:#${hex}">
        <input type="color" value="#${hex}" data-idx="${i}" class="color-picker">
      </div>
      <input class="color-hex" type="text" value="${hex}" maxlength="6" data-idx="${i}">
      <button class="btn-remove" data-idx="${i}" title="Remove">×</button>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.color-picker').forEach(el => {
    el.addEventListener('input', e => {
      const idx = +e.target.dataset.idx;
      colors[idx] = hexToRgb(e.target.value);
      buildColorUI();
    });
  });

  list.querySelectorAll('.color-hex').forEach(el => {
    el.addEventListener('change', e => {
      const idx = +e.target.dataset.idx;
      const v = e.target.value.replace('#','');
      if(/^[0-9a-fA-F]{6}$/.test(v)){
        colors[idx] = hexToRgb(v);
        buildColorUI();
      }
    });
  });

  list.querySelectorAll('.btn-remove').forEach(el => {
    el.addEventListener('click', e => {
      const idx = +e.target.dataset.idx;
      if(colors.length > 2) {
        colors.splice(idx, 1);
        buildColorUI();
      }
    });
  });
}

document.getElementById('btn-add-color').addEventListener('click', () => {
  if(colors.length < 8){
    colors.push([Math.random()*255|0, Math.random()*255|0, Math.random()*255|0]);
    buildColorUI();
  }
});

buildColorUI();

// ─── PARAM BINDING ───────────────────────────────────────────────────────────
function bindParam(name){
  const input = document.getElementById('p-'+name);
  const slider = document.getElementById('s-'+name);

  const sync = val => {
    params[name] = +val;
    if(input)  input.value = (+val).toFixed(name==='seed'||name==='definition'||name==='bands'?0:2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
    if(slider) slider.value = val;
  };

  if(input) input.addEventListener('change', e => sync(e.target.value));
  if(slider) slider.addEventListener('input', e => sync(e.target.value));
}

['seed','speed','scale','amplitude','frequency','definition','bands'].forEach(bindParam);

window.stepParam = function(name, delta){
  const nv = Math.round((params[name] + delta) * 1000) / 1000;
  params[name] = nv;
  const input  = document.getElementById('p-'+name);
  const slider = document.getElementById('s-'+name);
  if(input)  input.value  = nv;
  if(slider) slider.value = nv;
};

// ─── UI TOGGLE ───────────────────────────────────────────────────────────────
const panel     = document.getElementById('panel');
const toggleBtn = document.getElementById('toggle-ui');

function hideUI(){
  panel.classList.add('hidden');
  toggleBtn.classList.remove('ui-visible');
}

function showUI(){
  panel.classList.remove('hidden');
  toggleBtn.classList.add('ui-visible');
}

// Initially show
showUI();

// ─── PAUSE ───────────────────────────────────────────────────────────────────
window.togglePause = function(){
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  btn.textContent = paused ? '▶ Play' : '⏸ Pause';
  btn.classList.toggle('active', paused);
};

// ─── FULLSCREEN ──────────────────────────────────────────────────────────────
window.toggleFullscreen = function(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    document.getElementById('btn-fs').classList.add('active');
  } else {
    document.exitFullscreen();
    document.getElementById('btn-fs').classList.remove('active');
  }
};

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key === 'h' || e.key === 'H'){
    panel.classList.contains('hidden') ? showUI() : hideUI();
  }
  if(e.key === 'f' || e.key === 'F') toggleFullscreen();
  if(e.key === ' ') { e.preventDefault(); togglePause(); }
});

// ─── HINT FADE ───────────────────────────────────────────────────────────────
const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('fade'), 4000);
</script>
</body>
</html>
